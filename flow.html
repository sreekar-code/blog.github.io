<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow — Sreekar Scribbles</title>
    <script async src="https://analytics.balla.dev/script.js" data-website-id="2d661ca0-e926-4c3c-8d8c-e948998a7ac8"></script>
    <link rel="stylesheet" href="styles.css?v=47">
    <style>
        .flow-desc {
            font-size: 0.8em;
            color: var(--fg);
            margin-top: 40px;
            margin-bottom: 48px;
        }
        .tracker { display: block !important; margin-top: 12px !important; margin-bottom: 20px !important; gap: 0 !important; }
        .year-nav {
            display: grid;
            grid-template-columns: 20px 1fr 20px;
            align-items: center;
            line-height: 1;
            margin-bottom: 6px;
        }
        #yearTitle { text-align: center; }
        #nextYear { justify-self: end; }
        .gh-weeks {
            display: grid;
            gap: 3px;
            width: 100%;
        }
        .gh-week { display: flex; flex-direction: column; gap: 3px; }
        .gh-cell {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 3px;
            background: var(--dot-empty);
        }
        .gh-cell.filled { background: var(--dot-filled); }
        .gh-cell.today { box-shadow: 0 0 0 1.5px var(--dot-today); }
        @media (max-width: 600px) {
            #ghTracker { overflow-x: auto; padding-bottom: 4px; }
        }
    </style>
</head>
<body>
    <header class="blogtitle">Flow</header>
    <p><a href="index.html">Home</a> &nbsp;&nbsp; <a href="blog.html">Blog</a> &nbsp;&nbsp; Flow &nbsp;&nbsp; <a href="cooking.html">Cooking</a> &nbsp;&nbsp; <a href="mailto:sreekarscribbles@gmail.com">Let's connect</a></p>
    <hr>

    <p class="flow-desc">I try to publish regularly. Each dot is a day. Dark ones are posts.</p>

    <main class="tracker">

        <div class="year-nav">
            <button id="prevYear" class="cal-nav-btn">←</button>
            <span id="yearTitle" class="cal-title"></span>
            <button id="nextYear" class="cal-nav-btn">→</button>
        </div>
        <div class="gh-tracker" id="ghTracker"></div>

        <details class="log-section" id="logSection" style="display:none">
            <summary>Log post</summary>
            <div class="log-form">
                <input type="date" id="postDate">
                <button id="addPostBtn">add</button>
            </div>
            <p id="syncStatus" class="sync-status"></p>
            <ul class="log-list" id="postDatesList"></ul>
            <button id="changeTokenBtn" class="reset-best">change token</button>
        </details>

    </main>

    <script>
        const TOKEN_KEY  = 'ghToken';
        const DATES_KEY  = 'blogPostDates';
        const GITHUB_API = 'https://api.github.com/repos/sreekar-code/blog.github.io/contents/dates.json';

        const SHORT_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

        let dates = [];
        let viewYear = new Date().getFullYear();

        function toYMD(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function buildTracker() {
            const container = document.getElementById('ghTracker');
            container.innerHTML = '';

            const postSet = new Set(dates);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayStr = toYMD(today);
            const year = viewYear;
            document.getElementById('yearTitle').textContent = year;
            const nextBtn = document.getElementById('nextYear');
            nextBtn.style.visibility = year >= today.getFullYear() ? 'hidden' : '';

            // Start: Monday of the week containing Jan 1
            const jan1 = new Date(year, 0, 1);
            const startOffset = (jan1.getDay() + 6) % 7;
            const startDate = new Date(jan1);
            startDate.setDate(jan1.getDate() - startOffset);

            // End: Sunday of the week containing Dec 31
            const dec31 = new Date(year, 11, 31);
            const endOffset = (dec31.getDay() + 6) % 7;
            const endDate = new Date(dec31);
            endDate.setDate(dec31.getDate() + (6 - endOffset));

            // Build array of weeks
            const weeks = [];
            const d = new Date(startDate);
            while (d <= endDate) {
                const week = [];
                for (let i = 0; i < 7; i++) {
                    week.push(new Date(d));
                    d.setDate(d.getDate() + 1);
                }
                weeks.push(week);
            }

            const cellSize = window.innerWidth < 600 ? '10px' : '1fr';
            const cols = `repeat(${weeks.length}, ${cellSize})`;

            // Weeks grid
            const weeksRow = document.createElement('div');
            weeksRow.className = 'gh-weeks';
            weeksRow.style.gridTemplateColumns = cols;
            weeks.forEach(week => {
                const col = document.createElement('div');
                col.className = 'gh-week';
                week.forEach(day => {
                    const cell = document.createElement('div');
                    cell.className = 'gh-cell';
                    const ds = toYMD(day);
                    if (day.getFullYear() === year) {
                        if (postSet.has(ds)) cell.classList.add('filled');
                        if (ds === todayStr) cell.classList.add('today');
                        if (day > today) cell.classList.add('future');
                    }
                    col.appendChild(cell);
                });
                weeksRow.appendChild(col);
            });

            container.appendChild(weeksRow);
        }

        function update() {
            buildTracker();
            renderList();
        }

        // ── GitHub sync ──────────────────────────────────────────────────────

        async function loadDates() {
            try {
                const res = await fetch('./dates.json?_=' + Date.now());
                if (!res.ok) throw new Error();
                dates = await res.json();
            } catch {
                dates = [];
            }
            const local = JSON.parse(localStorage.getItem(DATES_KEY) || '[]');
            dates = [...new Set([...dates, ...local])].sort();
        }

        function setSyncStatus(msg, isError) {
            const el = document.getElementById('syncStatus');
            if (!el) return;
            el.textContent = msg;
            el.style.color = isError ? '#c77' : '#aaa';
        }

        async function syncToGitHub() {
            dates = [...new Set(dates)].sort();
            localStorage.setItem(DATES_KEY, JSON.stringify(dates));
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) return;
            setSyncStatus('syncing…', false);
            try {
                const getRes = await fetch(GITHUB_API, {
                    headers: { Authorization: `Bearer ${token}`, 'X-GitHub-Api-Version': '2022-11-28' }
                });
                if (!getRes.ok) throw new Error('get failed');
                const { sha } = await getRes.json();
                const putRes = await fetch(GITHUB_API, {
                    method: 'PUT',
                    headers: {
                        Authorization: `Bearer ${token}`,
                        'Content-Type': 'application/json',
                        'X-GitHub-Api-Version': '2022-11-28'
                    },
                    body: JSON.stringify({
                        message: 'log: update post dates',
                        content: btoa(JSON.stringify(dates)),
                        sha
                    })
                });
                if (!putRes.ok) throw new Error('put failed');
                setSyncStatus('synced ✓', false);
                setTimeout(() => setSyncStatus('', false), 3000);
            } catch {
                setSyncStatus('sync failed — check token', true);
            }
        }

        // ── Admin panel ──────────────────────────────────────────────────────

        function renderList() {
            const list = document.getElementById('postDatesList');
            list.innerHTML = '';
            [...dates].sort().reverse().forEach(date => {
                const li  = document.createElement('li');
                const btn = document.createElement('button');
                btn.className = 'log-remove';
                btn.textContent = '×';
                btn.addEventListener('click', async () => {
                    dates = dates.filter(d => d !== date);
                    update();
                    await syncToGitHub();
                });
                li.appendChild(document.createTextNode(date));
                li.appendChild(btn);
                list.appendChild(li);
            });
        }

        document.getElementById('addPostBtn').addEventListener('click', async () => {
            const val = document.getElementById('postDate').value;
            if (!val) return;
            if (!dates.includes(val)) dates.push(val);
            update();
            await syncToGitHub();
        });

        document.getElementById('postDate').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('addPostBtn').click();
        });

        const ADMIN_HASH = '3b4b8072bd0a4606ffd2854d373d607aedb78a8406c929783c0b1db5cec80c25';

        async function hashInput(str) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        document.querySelector('.log-section > summary').addEventListener('click', e => {
            const panel = e.currentTarget.closest('details');
            if (panel.open) return;
            e.preventDefault();
            const input = prompt('password');
            if (input === null) return;
            hashInput(input).then(hash => {
                if (hash !== ADMIN_HASH) return;
                if (!localStorage.getItem(TOKEN_KEY)) {
                    const token = prompt('GitHub token (stored on this device only):');
                    if (token) localStorage.setItem(TOKEN_KEY, token.trim());
                }
                panel.open = true;
            });
        });

        document.getElementById('changeTokenBtn').addEventListener('click', () => {
            const token = prompt('Enter new GitHub token:');
            if (token === null) return;
            if (token.trim()) {
                localStorage.setItem(TOKEN_KEY, token.trim());
                setSyncStatus('token saved', false);
                setTimeout(() => setSyncStatus('', false), 2000);
            } else {
                localStorage.removeItem(TOKEN_KEY);
                setSyncStatus('token cleared', false);
                setTimeout(() => setSyncStatus('', false), 2000);
            }
        });

        document.getElementById('prevYear').addEventListener('click', () => {
            viewYear--;
            buildTracker();
        });

        document.getElementById('nextYear').addEventListener('click', () => {
            viewYear++;
            buildTracker();
        });

        document.getElementById('postDate').value = toYMD(new Date());
        loadDates().then(() => update());

        // Secret key combo: press 'l' three times quickly to reveal log section
        let keyBuffer = '', keyTimer;
        document.addEventListener('keydown', e => {
            if (e.key !== 'l') { keyBuffer = ''; return; }
            keyBuffer += 'l';
            clearTimeout(keyTimer);
            keyTimer = setTimeout(() => { keyBuffer = ''; }, 600);
            if (keyBuffer === 'lll') {
                document.getElementById('logSection').style.display = '';
                keyBuffer = '';
            }
        });
    </script>
<script src="nav.js?v=3"></script>
</body>
</html>
